target: http://127.0.0.1:8080
max_depth: 2
max_pages: 25
timeout: 5

auth:
  cookies: []
  headers:
    - "User-Agent: WebLabScanner/0.1.0"

checks:
  headers: true
  cookies: true
  csrf: true
  xss: true
  sqli: true

output:
  json: examples/sample_report.json
  html: examples/sample_report.html
